  {cat:"geography",no:{q:"Hva heter elven som renner gjennom Oslo?",opts:["Drammenselva","Akerselva","Glomma"],a:1,exp:"Akerselva renner gjennom Oslo fra Maridalsvannet til Oslofjorden og er kjent for sitt historiske industrilandskap og grøntområder."},en:{q:"What is the river that runs through Oslo called?",opts:["Drammenselva","Akerselva","Glomma"],a:1,exp:"The Akerselva runs through Oslo from Maridalsvannet to the Oslofjord and is known for its historical industrial landscape and green areas."}},
  {cat:"history",no:{q:"Hva er Fram?",opts:["Et norsk kampfly","Et norsk polarskip brukt av Nansen og Amundsen","En norsk ubåt"],a:1,exp:"Fram er det norske polarskipet som ble brukt av bl.a. Fridtjof Nansen og Roald Amundsen på arktiske og antarktiske ekspedisjoner. Skipet er nå utstilt på Frammuseet i Oslo."},en:{q:"What is the Fram?",opts:["A Norwegian fighter jet","A Norwegian polar ship used by Nansen and Amundsen","A Norwegian submarine"],a:1,exp:"The Fram is the Norwegian polar ship used by among others Fridtjof Nansen and Roald Amundsen on Arctic and Antarctic expeditions. The ship is now exhibited at the Fram Museum in Oslo."}},
  {cat:"society",no:{q:"Hva er «Likestillings- og diskrimineringsombudet»?",opts:["En domstol for diskrimineringssaker","Et uavhengig organ som fremmer likestilling og bekjemper diskriminering","Et politisk parti for minoriteter"],a:1,exp:"Likestillings- og diskrimineringsombudet (LDO) er et uavhengig offentlig organ som jobber for likestilling og mot diskriminering, og veileder enkeltpersoner og arbeidsgivere."},en:{q:"What is the 'Likestillings- og diskrimineringsombudet' (Equality and Anti-Discrimination Ombud)?",opts:["A court for discrimination cases","An independent body that promotes equality and combats discrimination","A political party for minorities"],a:1,exp:"The Equality and Anti-Discrimination Ombud (LDO) is an independent public body working for equality and against discrimination, advising individuals and employers."}},
  {cat:"government",no:{q:"Hva er «Regjeringen»?",opts:["Stortinget","Den utøvende makt ledet av statsministeren","Politiet og rettsvesenet"],a:1,exp:"Regjeringen er den utøvende makten i Norge, ledet av statsministeren. Den gjennomfører Stortingets vedtak og administrerer landet."},en:{q:"What is 'Regjeringen' (the Government)?",opts:["The Storting","The executive power led by the Prime Minister","The police and justice system"],a:1,exp:"The Government is the executive power in Norway, led by the Prime Minister. It implements the Storting's decisions and administers the country."}},
  {cat:"history",no:{q:"Hvem var Roald Amundsen?",opts:["En norsk statsminister","Mannen som ledet den første ekspedisjonen til Sydpolen","En norsk polarforsker som ledet Fram-ekspedisjonen"],a:1,exp:"Roald Amundsen (1872–1928) var en norsk polfarer som som den første nådde Sydpolen den 14. desember 1911, foran den britiske ekspedisjonen til Robert Falcon Scott."},en:{q:"Who was Roald Amundsen?",opts:["A Norwegian Prime Minister","The man who led the first expedition to the South Pole","A Norwegian polar explorer who led the Fram expedition"],a:1,exp:"Roald Amundsen (1872–1928) was a Norwegian explorer who was the first to reach the South Pole on 14 December 1911, ahead of the British expedition of Robert Falcon Scott."}},
  {cat:"culture",no:{q:"Hva er «Ibsen-prisen»?",opts:["En pris for norsk litteratur","En internasjonal teaterprisen oppkalt etter Henrik Ibsen","En pris for dramastudenter"],a:1,exp:"Ibsen-prisen (International Ibsen Award) er en internasjonal pris som deles ut annethvert år til teaterkunstnere som har gitt viktige bidrag til teatret."},en:{q:"What is the 'Ibsen-prisen' (International Ibsen Award)?",opts:["A prize for Norwegian literature","An international theatre prize named after Henrik Ibsen","A prize for drama students"],a:1,exp:"The International Ibsen Award is an international prize awarded every two years to theatre artists who have made important contributions to theatre."}},
  {cat:"world",no:{q:"Hva er Norges relasjon til Arktis?",opts:["Norge har ingen interesser i Arktis","Norge er en stor arktisk nasjon med suverenitet over Svalbard","Norge deler arktisk territorium med Russland"],a:1,exp:"Norge er en ledende arktisk nasjon med suverenitet over Svalbard og Jan Mayen. Norge grenser til Polhavet og er aktivt engasjert i arktisk politikk og forskning."},en:{q:"What is Norway's relationship to the Arctic?",opts:["Norway has no interests in the Arctic","Norway is a major Arctic nation with sovereignty over Svalbard","Norway shares Arctic territory with Russia"],a:1,exp:"Norway is a leading Arctic nation with sovereignty over Svalbard and Jan Mayen. Norway borders the Arctic Ocean and is actively engaged in Arctic politics and research."}},
];

// --- STATE ---
let lang = 'no';
let mode = null; // 'quiz' or 'menu'
let quizQ = [];
let current = 0;
let selected = null;
let confirmed = false;
let score = 0;
let answers = [];
let quizSize = 10;

const STRINGS = {
  no: {
    headerSub: "Norsk Statsborgerskap · Øvingsprøve",
    startTitle: "Velg antall spørsmål",
    startDesc: `Øvingsprøven inneholder ${ALL_QUESTIONS.length} spørsmål om norsk samfunn, historie, demokrati og kultur. Velg antall spørsmål og start øvingen!`,
    q10: "10 spørsmål", q10sub: "Rask økt · ca. 5 min",
    q20: "20 spørsmål", q20sub: "Standard økt · ca. 10 min",
    q36: "36 spørsmål", q36sub: "Full prøvelengde · ca. 20 min",
    q50: "50 spørsmål", q50sub: "Intensivøkt · ca. 30 min",
    totalQ: `${ALL_QUESTIONS.length} spørsmål i basen`,
    passReq: "75% kreves for å bestå",
    qOf: "Spørsmål",
    of: "av",
    correct: "riktige",
    confirm: "Bekreft svar",
    next: "Neste spørsmål →",
    results: "Se resultater →",
    passed: "Bestått ✓",
    failed: "Ikke bestått ✗",
    passMsg: "Bra jobbet! Du ville bestått den ekte prøven.",
    failMsg: "Du trenger 75% for å bestå. Øv mer og prøv igjen!",
    review: "Gjennomgang",
    correctAns: "Riktig svar:",
    restart: "Prøv igjen →",
    catNames: {history:"Historie",government:"Demokrati",royals:"Kongefamilien",geography:"Geografi",society:"Samfunn",rights:"Rettigheter",culture:"Kultur",world:"Norge og verden",everyday:"Hverdagsliv",health:"Helse",sami:"Samene"},
  },
  en: {
    headerSub: "Norwegian Citizenship · Practice Test",
    startTitle: "Choose number of questions",
    startDesc: `The practice test contains ${ALL_QUESTIONS.length} questions about Norwegian society, history, democracy and culture. Choose the number of questions and start practising!`,
    q10: "10 questions", q10sub: "Quick session · ~5 min",
    q20: "20 questions", q20sub: "Standard session · ~10 min",
    q36: "36 questions", q36sub: "Full exam length · ~20 min",
    q50: "50 questions", q50sub: "Intensive session · ~30 min",
    totalQ: `${ALL_QUESTIONS.length} questions in the bank`,
    passReq: "75% required to pass",
    qOf: "Question",
    of: "of",
    correct: "correct",
    confirm: "Confirm answer",
    next: "Next question →",
    results: "See results →",
    passed: "Passed ✓",
    failed: "Not passed ✗",
    passMsg: "Well done! You would have passed the real test.",
    failMsg: "You need 75% to pass. Keep practising and try again!",
    review: "Review",
    correctAns: "Correct answer:",
    restart: "Try again →",
    catNames: {history:"History",government:"Democracy",royals:"Royal Family",geography:"Geography",society:"Society",rights:"Rights",culture:"Culture",world:"Norway & the World",everyday:"Everyday Life",health:"Health",sami:"The Sami"},
  }
};

function t(key) { return STRINGS[lang][key] || key; }

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function shuffleOptions(item) {
  const order = shuffle([...item.no.opts.keys()]);
  const newA = order.indexOf(item.no.a);
  return {
    ...item,
    no: {...item.no, opts: order.map(i => item.no.opts[i]), a: newA},
    en: {...item.en, opts: order.map(i => item.en.opts[i]), a: newA},
  };
}

function render() {
  const screen = document.getElementById('screen');
  document.getElementById('header-sub').textContent = t('headerSub');
  const noLbl = document.getElementById('lang-no-lbl');
  const enLbl = document.getElementById('lang-en-lbl');
  noLbl.style.color = lang === 'no' ? '#c8d8f0' : '#4a5a7a';
  enLbl.style.color = lang === 'en' ? '#c8d8f0' : '#4a5a7a';

  if (!mode) {
    renderMenu(screen);
  } else if (mode === 'quiz') {
    renderQuiz(screen);
  } else if (mode === 'results') {
    renderResults(screen);
  }
}

function renderMenu(screen) {
  const s = STRINGS[lang];
  screen.innerHTML = `
    <div class="menu-card">
      <h2 style="font-size:18px;color:#e8dfc8;margin-bottom:10px;">${s.startTitle}</h2>
      <p class="menu-desc">${s.startDesc}</p>
      <div class="menu-options">
        <button class="menu-btn" onclick="startQuiz(10)"><span class="mb-title">${s.q10}</span><span class="mb-sub">${s.q10sub}</span></button>
        <button class="menu-btn highlight" onclick="startQuiz(20)"><span class="mb-title">${s.q20}</span><span class="mb-sub">${s.q20sub}</span></button>
        <button class="menu-btn" onclick="startQuiz(36)"><span class="mb-title">${s.q36}</span><span class="mb-sub">${s.q36sub}</span></button>
        <button class="menu-btn" onclick="startQuiz(50)"><span class="mb-title">${s.q50}</span><span class="mb-sub">${s.q50sub}</span></button>
      </div>
      <div class="stats-row">
        <div class="stat-item"><span class="stat-num">${ALL_QUESTIONS.length}</span><span class="stat-lbl">${lang==='no'?'Spørsmål':'Questions'}</span></div>
        <div class="stat-item"><span class="stat-num">10</span><span class="stat-lbl">${lang==='no'?'Kategorier':'Categories'}</span></div>
        <div class="stat-item"><span class="stat-num">75%</span><span class="stat-lbl">${lang==='no'?'Bestått':'Pass mark'}</span></div>
      </div>
    </div>`;
}

function renderQuiz(screen) {
  const s = STRINGS[lang];
  if (current >= quizQ.length) { renderResults(screen); return; }
  const item = quizQ[current];
  const q = item[lang];
  const catName = t('catNames')[item.cat] || item.cat;
  const progress = (current / quizQ.length) * 100;

  let optionsHTML = q.opts.map((opt, i) => {
    let cls = 'option-btn';
    let icon = '';
    if (confirmed) {
      if (i === q.a) { cls += ' correct'; icon = '<span class="opt-icon" style="color:#2d8a50">✓</span>'; }
      else if (i === selected && i !== q.a) { cls += ' wrong'; icon = '<span class="opt-icon" style="color:#c0392b">✗</span>'; }
      else cls += ' dim';
    } else if (selected === i) { cls += ' selected'; }
    return `<button class="${cls}" onclick="selectOpt(${i})"><span class="opt-letter">${['A','B','C'][i]}</span><span class="opt-text">${opt}</span>${icon}</button>`;
  }).join('');

  let explHTML = '';
  if (confirmed) {
    const cls = selected === q.a ? 'good' : 'bad';
    explHTML = `<div class="explanation ${cls}"><span class="expl-icon">${selected===q.a?'&#128161;':'&#128214;'}</span>${q.exp}</div>`;
  }

  const btnLabel = confirmed ? (current+1>=quizQ.length ? s.results : s.next) : s.confirm;
  const btnDisabled = (!confirmed && selected===null) ? 'disabled' : '';

  screen.innerHTML = `
    <div class="card" id="qcard">
      <div class="progress-row">
        <span class="progress-label">${s.qOf} ${current+1} ${s.of} ${quizQ.length}</span>
        <span class="progress-label">${score} ${s.correct}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="category-tag">${catName}</div>
      <p class="question-text">${q.q}</p>
      <div class="options">${optionsHTML}</div>
      ${explHTML}
      <div class="btn-row"><button class="btn" onclick="handleAction()" ${btnDisabled}>${btnLabel}</button></div>
    </div>`;
}

function renderResults(screen) {
  const s = STRINGS[lang];
  const pct = Math.round((score / quizQ.length) * 100);
  const passed = pct >= 75;

  let reviewHTML = answers.map((a,i) => {
    const q = quizQ[i][lang];
    return `<div class="review-item ${a.correct?'ok':'ko'}">
      <div class="review-q"><span class="review-icon" style="color:${a.correct?'#2d8a50':'#c0392b'}">${a.correct?'✓':'✗'}</span>${q.q}</div>
      ${!a.correct ? `<div class="review-correct">${s.correctAns} <strong>${q.opts[q.a]}</strong></div>` : ''}
      <div class="review-expl">${q.exp}</div>
    </div>`;
  }).join('');

  screen.innerHTML = `
    <div class="card">
      <div class="result-top">
        <div class="score-badge ${passed?'pass':'fail'}">
          <span class="score-pct">${pct}%</span>
          <span class="score-lbl">${passed?s.passed:s.failed}</span>
        </div>
        <div class="score-detail"><span style="font-size:24px;color:#e8dfc8">${score}</span><span class="score-of"> / ${quizQ.length}</span></div>
        <p class="result-note">${passed?s.passMsg:s.failMsg}</p>
      </div>
      <p class="review-title">${s.review}</p>
      <div class="review-list">${reviewHTML}</div>
      <button class="restart-btn" onclick="goMenu()">${s.restart}</button>
    </div>`;
}

// --- ACTIONS ---
function startQuiz(n) {
  quizSize = n;
  quizQ = shuffle(ALL_QUESTIONS).slice(0, n).map(shuffleOptions);
  current = 0; selected = null; confirmed = false; score = 0; answers = [];
  mode = 'quiz';
  render();
}

function selectOpt(i) {
  if (confirmed) return;
  selected = i;
  render();
}

function handleAction() {
  if (!confirmed) {
    if (selected === null) return;
    const q = quizQ[current][lang];
    const correct = selected === q.a;
    if (correct) score++;
    answers.push({correct, selected});
    confirmed = true;
    render();
  } else {
    const card = document.getElementById('qcard');
    if (card) { card.classList.add('fade'); setTimeout(() => { advance(); }, 200); }
    else advance();
  }
}

function advance() {
  current++;
  selected = null;
  confirmed = false;
  if (current >= quizQ.length) { mode = 'results'; }
  render();
}

function goMenu() {
  mode = null;
  render();
}

// --- LANG TOGGLE ---
document.getElementById('lang-toggle').addEventListener('change', function() {
  lang = this.checked ? 'en' : 'no';
  render();
});

// --- INIT ---
render();

// Register service worker for PWA/offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
